[build]
  command = "npm run build"
  publish = "dist"
  # These SMTP vars hold the public contact email displayed in the UI - not real secrets.
  environment = { SECRETS_SCAN_OMIT_KEYS = "SMTP_USER,SMTP_TO" }

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API routes are handled by Netlify Functions via config.path in each function file
# contact.js  → /api/contact
# counter.js  → /api/counter + /api/counter/increment
# leaderboard.js → /api/leaderboard

# HTTP headers for SEO and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Build assets (hashed) — lang cachen voor repeat visits
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Afbeeldingen — lang cachen
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — pre-rendered routes (blog, events) are served as static files before this rule
# React Router handles client-side routing for non-pre-rendered paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

