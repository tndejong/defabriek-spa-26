[build]
  command = "npm run build"
  publish = "dist"
  # These SMTP vars hold the public contact email displayed in the UI - not real secrets.
  environment = { SECRETS_SCAN_OMIT_KEYS = "SMTP_USER,SMTP_TO" }

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Route contact API to the Netlify Function before the SPA catch-all
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

# Handle SPA routing - redirect all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

