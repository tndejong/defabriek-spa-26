[build]
  command = "npm run build"
  publish = "dist"
  # SMTP_USER is the public contact email (info@defabriek.org) which is intentionally
  # displayed in the UI, so it is safe to omit from secrets scanning.
  environment = { SECRETS_SCAN_OMIT_KEYS = "SMTP_USER" }

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Route contact API to the Netlify Function before the SPA catch-all
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

# Handle SPA routing - redirect all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

