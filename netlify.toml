[build]
  command = "npm run build"
  publish = "dist"
  # These SMTP vars hold the public contact email displayed in the UI - not real secrets.
  environment = { SECRETS_SCAN_OMIT_KEYS = "SMTP_USER,SMTP_TO" }

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API routes are handled by Netlify Functions via config.path in each function file
# contact.js  → /api/contact
# counter.js  → /api/counter + /api/counter/increment
# leaderboard.js → /api/leaderboard

# Handle SPA routing - redirect all other routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

